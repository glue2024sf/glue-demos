<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SYSNAG様 Salesforce デモ画面（SES・PMO 商談／人材／アサイン管理）</title>
<!-- 開発中は外部参照、配布時は build.sh が <style>/<script> にインライン化する -->
<style>
/* =====================================================================
   demo-base.css — Glue Salesforce デモ 共通スタイル (SLDS Lightning 再現)
   ---------------------------------------------------------------------
   ・案件横断で共通の「chrome（ヘッダ/タブ/レコード作法）」と
     「コンポーネントライブラリ」をここに集約する。
   ・案件固有の色/業務独自パーツだけを各 index.html の <style> に追記する。
   ・配布時は build.sh がこのファイルを <style> へインライン展開し、
     単一HTML（ダブルクリックで開ける / 添付で送れる）にする。
   ・出典: docs/aion/demo (基準実装) + tsubasa(帳票/フォーム) を統合。
   ===================================================================== */

:root{
  --brand:#0176d3; --brand-dark:#014486; --brand-50:#eaf4fb;
  --bg:#f3f3f3; --card:#ffffff; --border:#dddbda; --border-light:#f3f2f2;
  --text:#181818; --text-2:#3e3e3c; --text-mute:#706e6b;
  --success:#2e844a; --success-bg:#cdefc4; --warn:#fe9339; --warn-bg:#fef0e6;
  --error:#ba0517; --error-bg:#fdd9d4; --info:#0176d3;
  --shadow-card:0 2px 2px rgba(0,0,0,.05),0 0 0 1px rgba(0,0,0,.06);
  --shadow-hover:0 2px 4px rgba(0,0,0,.1),0 0 0 1px rgba(0,0,0,.08);
  --radius:.25rem;
  /* 外部ツール色（案件で使う/使わないは任意。不要なら無視でOK） */
  --chatwork:#e57400; --chatwork-bg:#fff4e6;
  --claude:#cc785c; --claude-bg:#f5e9e2;
  --sheets:#0f9d58; --sheets-bg:#e6f4ea;
  /* 論点パネル */
  --disc:#7a5cff; --disc-bg:#f1edff; --disc-border:#c9bcff;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:"Salesforce Sans","Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic UI","Meiryo",sans-serif;
  font-size:13px; color:var(--text); background:var(--bg);
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit; cursor:pointer}
a{color:var(--brand); text-decoration:none}
a:hover{text-decoration:underline}

/* ===== Global Header ===== */
.global-header{
  background:linear-gradient(0deg,#032e61,#0176d3); height:48px;
  display:flex; align-items:center; padding:0 16px; gap:12px;
  position:sticky; top:0; z-index:1000;
}
.app-launcher{
  width:28px;height:28px;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.1); border-radius:3px; cursor:pointer;
}
.app-launcher:hover{background:rgba(255,255,255,.2)}
.app-launcher::before{
  content:""; width:14px;height:14px;
  background-image:
    radial-gradient(circle, #fff 1.2px, transparent 1.4px),
    radial-gradient(circle, #fff 1.2px, transparent 1.4px),
    radial-gradient(circle, #fff 1.2px, transparent 1.4px),
    radial-gradient(circle, #fff 1.2px, transparent 1.4px),
    radial-gradient(circle, #fff 1.2px, transparent 1.4px),
    radial-gradient(circle, #fff 1.2px, transparent 1.4px),
    radial-gradient(circle, #fff 1.2px, transparent 1.4px),
    radial-gradient(circle, #fff 1.2px, transparent 1.4px),
    radial-gradient(circle, #fff 1.2px, transparent 1.4px);
  background-size:5px 5px;
  background-position:0 0,5px 0,10px 0,0 5px,5px 5px,10px 5px,0 10px,5px 10px,10px 10px;
  background-repeat:no-repeat;
}
.app-name{
  color:#fff; font-weight:700; font-size:14px;
  padding-left:12px; border-left:1px solid rgba(255,255,255,.3);
}
.app-name .sub{font-weight:400; opacity:.8; margin-left:6px; font-size:12px}
.gh-spacer{flex:1}
.gh-search{
  background:rgba(255,255,255,.95); border-radius:3px; padding:6px 12px;
  width:380px; display:flex; align-items:center; gap:8px; font-size:13px;
}
.gh-search input{border:0;outline:0;flex:1;background:transparent;font-size:13px}
.gh-actions{display:flex; gap:8px; align-items:center}
.gh-actions .icon-btn{
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  color:#fff; cursor:pointer; border-radius:50%;
}
.gh-actions .icon-btn:hover{background:rgba(255,255,255,.15)}
.gh-user{
  width:32px;height:32px;border-radius:50%;
  background:#a5d8ff;color:#0b4a83;display:flex;align-items:center;justify-content:center;
  font-weight:700; cursor:pointer; font-size:12px;
}

/* ===== App Bar (Tabs) ===== */
.app-bar{
  background:#fff; border-bottom:1px solid var(--border);
  display:flex; align-items:stretch; padding:0 16px; height:40px;
  position:sticky; top:48px; z-index:999; overflow-x:auto;
}
.app-bar .tab{
  padding:0 16px; display:flex; align-items:center; gap:6px; cursor:pointer;
  border-bottom:3px solid transparent; color:var(--text-2); font-weight:400;
  font-size:13px; user-select:none; white-space:nowrap;
}
.app-bar .tab:hover{background:var(--brand-50)}
.app-bar .tab.active{border-bottom-color:var(--brand); color:var(--brand); font-weight:700}

/* ===== Main content ===== */
.main{padding:12px 16px; max-width:1440px; margin:0 auto}
.page{display:none}
.page.active{display:block}

/* ===== Object Page Header ===== */
.obj-header{
  background:#fff; padding:12px 16px; border:1px solid var(--border); border-radius:var(--radius);
  margin-bottom:8px;
}
.obj-header .row1{display:flex; align-items:center; gap:12px}
.obj-icon{
  width:40px;height:40px;border-radius:4px;display:flex;align-items:center;justify-content:center;
  color:#fff; font-size:18px; font-weight:700;
}
/* 標準オブジェクトのアイコン色（SLDS準拠）。案件のカスタムobjは追記する */
.obj-icon.account{background:#ff9a3c}
.obj-icon.lead{background:#f88962}
.obj-icon.opp{background:#fcb95b}
.obj-icon.contact{background:#7f8de1}
.obj-icon.quote{background:#a094ed}
.obj-icon.order{background:#2e844a}
.obj-icon.case{background:#f2cf5b}
.obj-icon.report{background:#76ded9}
.obj-icon.dashboard{background:#e6437f}
.obj-icon.home{background:#0176d3}
.obj-icon.custom{background:#5867e8}
.obj-icon.chatwork{background:var(--chatwork)}
.obj-icon.claude{background:var(--claude)}
.obj-icon.sheets{background:var(--sheets)}
.obj-title{flex:1}
.obj-title .label{color:var(--text-mute); font-size:12px}
.obj-title .name{font-size:18px; font-weight:700}
.obj-actions{display:flex; gap:6px; flex-wrap:wrap; align-items:center}

/* ===== Buttons ===== */
.btn{
  padding:6px 14px; border:1px solid var(--border); background:#fff;
  border-radius:var(--radius); font-size:13px; color:var(--text);
}
.btn:hover{background:var(--border-light)}
.btn.primary{background:var(--brand); color:#fff; border-color:var(--brand)}
.btn.primary:hover{background:var(--brand-dark)}
.btn.success{background:var(--success); color:#fff; border-color:var(--success)}
.btn.success:hover{filter:brightness(0.95)}
.btn.warn{background:var(--warn); color:#fff; border-color:var(--warn)}
.btn.small{padding:3px 10px; font-size:12px}

/* ===== Highlights Panel ===== */
.highlights{
  background:#fff; border:1px solid var(--border); border-radius:var(--radius);
  padding:12px 16px; display:flex; gap:32px; margin-bottom:8px; flex-wrap:wrap;
}
.highlights .item{min-width:120px}
.highlights .lbl{color:var(--text-mute); font-size:12px}
.highlights .val{font-size:15px; font-weight:700; margin-top:2px}

/* ===== Path Component (Sales/Stage Path) ===== */
.path{
  background:#fff; border:1px solid var(--border); border-radius:var(--radius);
  margin-bottom:8px; display:flex; padding:0; overflow:hidden;
}
.path .stage{
  flex:1; padding:10px 0; text-align:center; position:relative;
  background:#ecebea; color:var(--text-2); font-size:12px; cursor:pointer;
  clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 50%, calc(100% - 14px) 100%, 0 100%, 14px 50%);
  margin-right:-12px; min-width:0;
}
.path .stage:first-child{ clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 50%, calc(100% - 14px) 100%, 0 100%) }
.path .stage:last-child{
  clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%, 14px 50%); margin-right:0;
}
.path .stage.completed{background:#4bc076; color:#fff}
.path .stage.current{background:var(--brand); color:#fff; font-weight:700}
.path .stage:hover{filter:brightness(0.95)}
.path-label{
  display:flex; align-items:center; gap:6px;
  padding:4px 12px 0; font-size:11px; color:var(--text-mute); background:#fff;
  border:1px solid var(--border); border-bottom:0; border-radius:var(--radius) var(--radius) 0 0;
}
.path-label .badge{margin-left:auto}

/* ===== Layout grids ===== */
.two-col{display:grid; grid-template-columns:1fr 1fr; gap:8px}
.two-col-3{display:grid; grid-template-columns:2fr 1fr; gap:8px}
@media(max-width:1000px){ .two-col,.two-col-3{grid-template-columns:1fr} }

/* ===== Card ===== */
.card{
  background:#fff; border:1px solid var(--border); border-radius:var(--radius);
  margin-bottom:8px;
}
.card .card-head{
  padding:8px 16px; border-bottom:1px solid var(--border-light);
  display:flex; align-items:center; gap:8px; font-weight:700;
}
.card .card-head .actions{margin-left:auto; display:flex; gap:6px}
.card .card-body{padding:12px 16px}
.sec-title{
  font-size:12px; font-weight:700; color:var(--text-2);
  padding:8px 16px; background:#fafaf9; border-bottom:1px solid var(--border-light);
}

/* ===== Field rows (read view) ===== */
.field-grid{display:grid; grid-template-columns:1fr 1fr; gap:0 24px}
.field{padding:8px 0; border-bottom:1px solid var(--border-light)}
.field .lbl{color:var(--text-mute); font-size:12px; margin-bottom:2px}
.field .val{font-size:13px}
.field.full{grid-column:1/-1}
.field .val .ai-source{
  display:inline-block; padding:1px 6px; border-radius:8px;
  font-size:10px; background:var(--claude-bg); color:var(--claude);
  margin-left:6px; vertical-align:middle;
}
.field .val .cw-source{ background:var(--chatwork-bg); color:var(--chatwork); }

/* ===== Edit form (inline / modal) ===== */
.form-2col{display:grid; grid-template-columns:1fr 1fr; gap:12px 24px}
.form-row{display:flex; flex-direction:column; gap:4px}
.form-row.full{grid-column:1/-1}
.form-row label{font-size:12px; color:var(--text-2); font-weight:700}
.form-row label .req{color:var(--error); margin-left:2px}
.form-row input,.form-row select,.form-row textarea{
  font-family:inherit; font-size:13px; padding:6px 10px;
  border:1px solid var(--border); border-radius:var(--radius); background:#fff; color:var(--text);
}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{
  outline:0; border-color:var(--brand); box-shadow:0 0 0 2px var(--brand-50);
}
@media(max-width:700px){ .form-2col{grid-template-columns:1fr} }

/* ===== Table ===== */
.tbl{width:100%; border-collapse:collapse; background:#fff; font-size:13px}
.tbl th{
  background:#fafaf9; text-align:left; padding:8px 12px;
  border-bottom:1px solid var(--border); font-weight:700; color:var(--text-2); font-size:12px;
}
.tbl td{padding:8px 12px; border-bottom:1px solid var(--border-light)}
.tbl tr:last-child td{border-bottom:0}
.tbl .num{text-align:right}
.tbl tbody tr:hover{background:var(--brand-50)}
.tbl .name-link{font-weight:700; cursor:pointer; color:var(--brand)}

/* ===== Badges ===== */
.badge{display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:700}
.badge.info{background:#e0f0fb; color:#0176d3}
.badge.success{background:var(--success-bg); color:var(--success)}
.badge.warn{background:var(--warn-bg); color:var(--warn)}
.badge.error{background:var(--error-bg); color:var(--error)}
.badge.gray{background:#ecebea; color:var(--text-mute)}
.badge.cw{background:var(--chatwork-bg); color:var(--chatwork)}
.badge.claude{background:var(--claude-bg); color:var(--claude)}
.badge.sheets{background:var(--sheets-bg); color:var(--sheets)}

/* ===== Related list card ===== */
.related-card{
  background:#fff; border:1px solid var(--border); border-radius:var(--radius); margin-bottom:8px;
}
.related-head{
  padding:8px 16px; border-bottom:1px solid var(--border-light);
  display:flex; align-items:center; gap:8px; font-weight:700;
}
.related-head .count{color:var(--text-mute); font-weight:400; font-size:12px}
.related-head .actions{margin-left:auto}

/* ===== Activity Timeline ===== */
.timeline{padding:8px 16px}
.tl-item{display:flex; gap:10px; padding:8px 0; border-bottom:1px solid var(--border-light)}
.tl-item:last-child{border-bottom:0}
.tl-icon{
  width:28px; height:28px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:#fff;
}
.tl-icon.call{background:#76ded9}
.tl-icon.mail{background:#fcb95b}
.tl-icon.meet{background:#0176d3}
.tl-icon.task{background:#4bca81}
.tl-icon.cw{background:var(--chatwork)}
.tl-icon.claude{background:var(--claude)}
.tl-body{flex:1}
.tl-meta{font-size:11px; color:var(--text-mute)}
.tl-title{font-weight:700; margin-top:1px}
.tl-desc{color:var(--text-2); margin-top:2px; font-size:12px}

/* ===== Dashboard widgets ===== */
.dash-grid{display:grid; grid-template-columns:repeat(12,1fr); gap:8px}
.widget{background:#fff; border:1px solid var(--border); border-radius:var(--radius); padding:12px 16px}
.widget.span-3{grid-column:span 3}
.widget.span-4{grid-column:span 4}
.widget.span-6{grid-column:span 6}
.widget.span-8{grid-column:span 8}
.widget.span-12{grid-column:span 12}
.w-title{font-weight:700; font-size:13px; margin-bottom:6px; color:var(--text-2)}
.w-big{font-size:28px; font-weight:700; line-height:1.1}
.w-sub{font-size:11px; color:var(--text-mute); margin-top:2px}
.w-sub.up{color:var(--success)}
.w-sub.down{color:var(--error)}

/* Bar chart (CSS only) */
.bar-chart-wrap{padding:8px 0 0}
.bar-chart{display:flex; align-items:flex-end; gap:6px; height:160px; padding:0 4px}
.bar-chart .bar{
  flex:1; background:linear-gradient(0deg,#0176d3,#4faae8);
  border-radius:3px 3px 0 0; position:relative; display:flex; flex-direction:column;
  justify-content:flex-end; align-items:center; min-width:0;
}
.bar-chart .bar .v{font-size:10px; color:var(--text-2); position:absolute; top:-16px}
.bar-chart .bar .x{font-size:10px; color:var(--text-mute); position:absolute; bottom:-18px}

/* Donut (conic-gradient) */
.donut-wrap{display:flex; align-items:center; gap:14px; padding:6px 0}
.donut{width:120px; height:120px; border-radius:50%}
.legend{flex:1; font-size:12px}
.lg-item{display:flex; align-items:center; gap:6px; padding:3px 0}
.lg-dot{width:10px; height:10px; border-radius:2px}

/* ===== Misc ===== */
.help-text{color:var(--text-mute); font-size:11px}
.crumb{font-size:11px; color:var(--text-mute); margin-bottom:4px}
.crumb a{color:var(--text-mute); cursor:pointer}
.crumb .sep{margin:0 4px; color:#bbb}

/* ===== Callout (in-screen note) ===== */
.callout{
  background:var(--brand-50); border-left:3px solid var(--brand);
  padding:10px 14px; border-radius:0 var(--radius) var(--radius) 0;
  margin-bottom:10px; font-size:12px;
}
.callout.warn{background:var(--warn-bg); border-color:var(--warn)}
.callout.success{background:var(--success-bg); border-color:var(--success)}
.callout strong{font-weight:700}

/* ===== Modal ===== */
.modal-bg{
  display:none; position:fixed; inset:0; background:rgba(0,0,0,.4);
  z-index:2000; align-items:center; justify-content:center; padding:24px;
}
.modal-bg.active{display:flex}
.modal{
  background:#fff; border-radius:6px; max-width:880px; width:100%;
  max-height:90vh; overflow:auto; box-shadow:0 8px 24px rgba(0,0,0,.2);
}
.modal-head{padding:14px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center}
.modal-head .title{font-weight:700; font-size:15px; flex:1}
.modal-head .close{cursor:pointer; font-size:20px; color:var(--text-mute)}
.modal-body{padding:20px}
.modal-foot{padding:12px 20px; border-top:1px solid var(--border); display:flex; gap:8px; justify-content:flex-end}

/* ===== Toast ===== */
.toast{
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
  background:#181818; color:#fff; padding:12px 20px; border-radius:6px; font-size:13px;
  box-shadow:0 4px 16px rgba(0,0,0,.3); opacity:0; pointer-events:none;
  transition:opacity .25s, transform .25s; z-index:3000; max-width:90vw;
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
.toast.success{background:#1b5e2f}

/* ===== 帳票 / PDF プレビュー (見積書・請求書・契約書) ===== */
.pdf-toolbar{
  background:#3c3c3c; color:#eee; padding:6px 14px; font-size:12px;
  display:flex; align-items:center; gap:12px; border-radius:6px 6px 0 0;
}
.pdf-page{
  background:#fff; max-width:760px; margin:0 auto; padding:48px 56px;
  box-shadow:0 2px 12px rgba(0,0,0,.15); font-size:13px; color:#222;
}
.pdf-hdr{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:28px}
.pdf-title{font-size:24px; font-weight:700; letter-spacing:.3em; border-bottom:2px solid #222; padding-bottom:6px}
.pdf-tbl{width:100%; border-collapse:collapse; margin:18px 0; font-size:12px}
.pdf-tbl th{background:#333; color:#fff; padding:8px 10px; text-align:left}
.pdf-tbl td{padding:8px 10px; border-bottom:1px solid #ddd}
.pdf-tbl .num{text-align:right}
.pdf-amount-box{border:2px solid #222; padding:10px 16px; display:inline-block; font-size:18px; font-weight:700; margin:10px 0}
.pdf-stamp{
  width:64px;height:64px;border:2px solid #d33;border-radius:50%;color:#d33;
  display:flex;align-items:center;justify-content:center;font-size:11px;transform:rotate(-12deg);
}
.pdf-bottom{margin-top:32px; font-size:11px; color:#555}

/* =====================================================================
   論点パネル (.disc) ── デモ品質の核
   画面ごとに「出典 / 論点 / ※要確認」を載せ、デモを意思決定文書にする。
   bodyに class="disc-on" が付くと表示。右下トグルで全画面ON/OFF。
   プレゼン中は隠し(clean)、FB/レビュー時は表示に切替える運用。
   ===================================================================== */
.disc{display:none}
body.disc-on .disc{
  display:block;
  background:var(--disc-bg); border:1px solid var(--disc-border); border-left:4px solid var(--disc);
  border-radius:0 var(--radius) var(--radius) 0; padding:10px 14px; margin:0 0 10px; font-size:12px;
}
.disc .disc-q{font-weight:700; color:var(--disc); margin-bottom:3px}
.disc .disc-src{font-size:11px; color:var(--text-mute); margin-bottom:4px}
.disc .disc-src::before{content:"📎 出典: "}
.disc .disc-body{color:var(--text-2); line-height:1.6}
.disc .disc-flag{
  display:inline-block; background:var(--warn-bg); color:var(--warn);
  font-weight:700; font-size:11px; padding:1px 7px; border-radius:8px; margin:0 2px;
}
.disc .disc-flag::before{content:"※要確認 "}
/* 論点トグル（右下固定） */
.disc-toggle{
  position:fixed; right:18px; bottom:18px; z-index:2500;
  background:var(--disc); color:#fff; border:0; border-radius:20px;
  padding:9px 16px; font-size:13px; font-weight:700; box-shadow:0 3px 10px rgba(0,0,0,.25);
}
.disc-toggle:hover{filter:brightness(1.05)}
body.disc-on .disc-toggle{background:#fff; color:var(--disc); border:1px solid var(--disc-border)}

/* ===== Responsive ===== */
@media(max-width:1000px){
  .dash-grid{grid-template-columns:repeat(4,1fr)}
  .widget.span-3,.widget.span-4{grid-column:span 2}
  .widget.span-6,.widget.span-8,.widget.span-12{grid-column:span 4}
  .gh-search{display:none}
}
</style>
<style>
/* === SYSNAG固有スタイル === */
.obj-icon.project{background:#5867e8}   /* 案件 */
.obj-icon.talent{background:#0b827c}    /* タレント(人材) */
.obj-icon.assign{background:#e6437f}    /* アサイン */
:root{ --ses:#5867e8; --ses-bg:#eceafe; --pmo:#0b827c; --pmo-bg:#e3f7f4; --sander:#c23934; --sander-bg:#fde7e6; }

/* 事業(SES/PMO)切替バッジ */
.biz{display:flex;gap:6px;align-items:center;margin-left:12px}
.biz .bbtn{font-size:11px;font-weight:700;padding:3px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.5);color:#fff;cursor:pointer;background:rgba(255,255,255,.12)}

/* カンバン（案件パイプライン） */
.kanban{display:flex;gap:10px;overflow-x:auto;padding:4px 0 10px}
.kb-col{flex:0 0 210px;background:#f1f2f5;border-radius:8px;padding:8px;min-height:120px}
.kb-col .kb-head{font-size:12px;font-weight:700;color:var(--text-2);display:flex;justify-content:space-between;padding:2px 4px 8px}
.kb-col .kb-head .n{color:var(--text-mute);font-weight:400}
.kb-card{background:#fff;border:1px solid var(--border);border-left:3px solid var(--ses);border-radius:6px;padding:8px 10px;margin-bottom:8px;cursor:pointer}
.kb-card:hover{box-shadow:var(--shadow-hover)}
.kb-card.pmo{border-left-color:var(--pmo)}
.kb-card .t{font-weight:700;font-size:12px;margin-bottom:3px}
.kb-card .c{font-size:11px;color:var(--text-mute)}
.kb-card .r{font-size:11px;margin-top:4px;display:flex;justify-content:space-between}
.kb-card .r b{color:var(--text)}

/* スキルバッジ */
.skills{display:flex;flex-wrap:wrap;gap:4px;margin-top:2px}
.skill{font-size:11px;background:var(--brand-50);color:var(--brand-dark);border:1px solid #cfe4f6;border-radius:4px;padding:1px 7px;font-weight:600}
.skill.hit{background:var(--success-bg);color:var(--success);border-color:#a5dfa0}
.skill.miss{background:#f1f0f0;color:var(--text-mute);border-color:var(--border)}

/* マッチングスコア */
.match-row{display:grid;grid-template-columns:150px 1fr 132px 96px;gap:10px;align-items:center;padding:9px 6px;border-bottom:1px solid var(--border-light)}
.match-row.head{font-size:12px;font-weight:700;color:var(--text-2);background:#fafaf9}
.score-bar{height:8px;background:#eee;border-radius:5px;overflow:hidden}
.score-bar > i{display:block;height:100%;background:linear-gradient(90deg,#2e844a,#7ed957)}
.score-bar.mid > i{background:linear-gradient(90deg,#fe9339,#ffd27a)}
.score-bar.low > i{background:linear-gradient(90deg,#ba0517,#f18b82)}
.score-num{font-weight:800;font-size:15px}

/* 粗利表示 */
.gp{font-weight:800}
.gp.good{color:var(--success)} .gp.mid{color:var(--warn)} .gp.bad{color:var(--error)}

/* Sander注記 */
.sander-note{background:var(--sander-bg);border-left:3px solid var(--sander);padding:8px 12px;border-radius:0 4px 4px 0;font-size:12px;margin-bottom:10px}
.sander-note b{color:var(--sander)}

/* 稼働ステータス点 */
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
.dot.work{background:var(--success)} .dot.wait{background:var(--warn)} .dot.plan{background:var(--brand)} .dot.off{background:var(--text-mute)}

:root{ --asana:#f06a6a; --asana-bg:#fdeeee; }
.from-asana{font-size:11px;font-weight:400;color:var(--asana);background:var(--asana-bg);border:1px solid #f8caca;border-radius:10px;padding:1px 9px;margin-left:8px}
.auto-tag{font-size:10px;font-weight:700;color:var(--success);background:var(--success-bg);border-radius:3px;padding:1px 6px;margin-left:6px;vertical-align:middle}

.field .val{position:relative}
.editable{cursor:pointer;border-radius:3px;padding:1px 3px;margin:-1px -3px;display:inline-block;min-width:40px}

/* ---------------------------------------------------------------
   3. ストア（localStorage 永続化）
   --------------------------------------------------------------- */
const KEY = 'sysnag-demo-v1';
const Store = {
  data:null, seq:{},
  load(){
    try{
      const raw = localStorage.getItem(KEY);
      if(raw){ const o = JSON.parse(raw); this.data = o; this.seq = o.seq || {}; return; }
    }catch(e){ console.warn('[demo] load失敗', e); }
    this.reset(true);
  },
  save(){
    try{ this.data.seq = this.seq; localStorage.setItem(KEY, JSON.stringify(this.data)); }
    catch(e){ console.warn('[demo] save失敗', e); }
  },
  reset(silent){
    this.data = seed(); this.seq = this.data.seq;
    this.save();
    if(!silent){ Toast.show('デモデータを初期状態に戻しました','success'); Router.render(); }
  },
  // 汎用アクセサ
  all(t){ return this.data[t] || []; },
  get(t,id){ return this.all(t).find(r=>r.id===id); },
  insert(t,rec){ this.all(t).unshift(rec); this.save(); return rec; },
  update(t,id,patch){ const r=this.get(t,id); if(r){ Object.assign(r,patch); this.save(); } return r; },
  remove(t,id){ const a=this.all(t); const i=a.findIndex(r=>r.id===id); if(i>=0){ a.splice(i,1); this.save(); return true; } return false; }
};

/* ---------------------------------------------------------------
   4. 計算ロジック（Salesforceの数式／ロールアップ相当）
   --------------------------------------------------------------- */
const Calc = {
  gross: a => (Number(a.billRate)||0) - (Number(a.costRate)||0),
  grossRate: a => { const b=Number(a.billRate)||0; return b ? (Calc.gross(a)/b*100) : 0; },
  grossClass: a => { const r=Calc.grossRate(a); return r>=28?'good':r>=18?'mid':'bad'; },
  // 案件へのロールアップ
  projectGross: pid => Store.all('assignments').filter(a=>a.projectId===pid && a.status!=='終了')
                        .reduce((s,a)=>s+Calc.gross(a),0),
  projectAmount: pid => Store.all('assignments').filter(a=>a.projectId===pid && a.status!=='終了')
                        .reduce((s,a)=>s+(Number(a.billRate)||0),0),
  // タレントへのロールアップ（Asana【並行】に相当）
  talentParallel: tid => {
    const as = Store.all('assignments').filter(a=>a.talentId===tid);
    return {
      proposal: as.filter(a=>a.status==='提案中').length,
      interview: as.filter(a=>['面談待ち','面談済'].includes(a.status)).length,
      offer: as.filter(a=>a.status==='内定').length,
      active: as.filter(a=>a.status==='稼働中').length
    };
  },
  // 全社指標
  kpi(){
    const as = Store.all('assignments');
    const active = as.filter(a=>a.status==='稼働中');
    const talents = Store.all('talents');
    const waiting = talents.filter(t=>t.status==='待機');
    const gross = active.reduce((s,a)=>s+Calc.gross(a),0);
    const bill  = active.reduce((s,a)=>s+(Number(a.billRate)||0),0);
    const endingSoon = active.filter(a=>a.endDate && daysBetween(today(), a.endDate) <= 45 && daysBetween(today(), a.endDate) >= 0);
    const pipeline = Store.all('projects').filter(p=>STAGE_OPEN.includes(p.stage))
                      .reduce((s,p)=>s+(Number(p.rateMax)||0)*(Number(p.headcount)||0),0);
    return {
      activeCount: active.length,
      talentCount: talents.length,
      rate: talents.length ? active.length/talents.length*100 : 0,
      waitingCount: waiting.length,
      endingSoon: endingSoon.length,
      gross, bill,
      grossRate: bill ? gross/bill*100 : 0,
      pipeline,
      lossPerMonth: waiting.reduce((s,t)=>s+(Number(t.rate)||0)*0.3,0)
    };

};

/* ---- 表示ヘルパー ---- */
function nameOf(t,id){ const r=Store.get(t,id); return r ? esc(r.name||r.initials||r.id) : '—'; }
function initialsOf(id){ const r=Store.get('talents',id); return r?esc(r.initials):'—'; }
function skillTags(v){ return '<div class="skills">' + (v||[]).slice(0,5).map(s=>`<span class="skill">${esc(s)}</span>`).join('') + ((v||[]).length>5?`<span class="skill miss">+${v.length-5}</span>`:'') + '</div>'; }
function stageBadge(v){
  const c = v==='参画(受注)'?'success' : v==='失注'?'error' : v==='終了'?'gray' : v==='内定'?'success' : 'info';
  return `<span class="badge ${c}">${esc(v)}</span>`;
}
function assignBadge(v){
  const c = v==='稼働中'?'success' : v==='終了'?'gray' : v==='内定'?'success' : v==='提案中'?'warn' : 'info';
  return `<span class="badge ${c}">${esc(v)}</span>`;
}
function statusDot(v){
  const c = v==='稼働中'?'work' : v==='待機'?'wait' : v==='参画予定'?'plan':'off';
  return `<span class="dot ${c}"></span>${esc(v)}`;
}
function parallelBadges(tid){
  const p = Calc.talentParallel(tid); const out=[];
  if(p.proposal) out.push(`<span class="badge info">提案${p.proposal}</span>`);
  if(p.interview) out.push(`<span class="badge warn">面談${p.interview}</span>`);
  if(p.offer) out.push(`<span class="badge success">内定${p.offer}</span>`);
  return out.length? out.join(' ') : '—';
}
function countActiveByAccount(accId){
  const pids = Store.all('projects').filter(p=>p.accountId===accId).map(p=>p.id);
  let n = Store.all('assignments').filter(a=>a.status==='稼働中'&&pids.includes(a.projectId)).length;
  n += Store.all('assignments').filter(a=>{ const t=Store.get('talents',a.talentId); return a.status==='稼働中'&&t&&t.bpAccountId===accId; }).length;
  return n;
}

/* ---------------------------------------------------------------
   6. ルーター
   --------------------------------------------------------------- */
const TABS = [
  {id:'home',       l:'🏠 ホーム'},
  {id:'projects',   l:'📁 案件'},
  {id:'match',      l:'🎯 マッチング'},
  {id:'talents',    l:'👤 タレント'},
  {id:'assignments',l:'🔗 アサイン'},
  {id:'accounts',   l:'🏢 取引先'},
  {id:'contacts',   l:'👥 人情報'},
  {id:'docs',       l:'📄 見積・請求'},
  {id:'dashboard',  l:'📊 分析'},
  {id:'asana',      l:'🔄 Asana対比'},
  {id:'isec',       l:'🧾 帳票の流れ'},
  {id:'issues',     l:'📋 論点整理'}
];

const Router = {
  page:'home', recId:null, biz:'all',
  go(page, id){
    this.page=page; this.recId=id||null;
    location.hash = '#/'+page + (id?('/'+id):'');
    this.render(); window.scrollTo({top:0,behavior:'smooth'});
  },
  fromHash(){
    const m = (location.hash||'').match(/^#\/([a-z-]+)(?:\/([A-Z]+-\d+))?/);
    if(m){ this.page=m[1]; this.recId=m[2]||null; } else { this.page='home'; this.recId=null; }
  },
  render(){
    $('#appBar').innerHTML = TABS.map(t=>
      `<div class="tab ${t.id===this.page?'active':''}" onclick="Router.go('${t.id}')">${t.l}</div>`).join('');
    const main = $('#main');
    const fn = Pages[this.page];
    main.innerHTML = fn ? fn(this.recId) : `<div class="empty"><span class="ic">🤷</span>画面が見つかりません（${esc(this.page)}）</div>`;
    Behaviors.bind();
  }
};

<script>
/* ---------------------------------------------------------------
   7. リストビュー状態 & 汎用レンダラ
   --------------------------------------------------------------- */
const ListState = {};
function ls(t){ return ListState[t] || (ListState[t] = {q:'',sort:null,dir:1,filters:{}}); }

function applyBiz(t, rows){
  if(Router.biz==='all') return rows;
  if(t==='projects') return rows.filter(r=>r.biz===Router.biz);
  if(t==='assignments') return rows.filter(r=>{ const p=Store.get('projects',r.projectId); return p && p.biz===Router.biz; });
  return rows;
}
function searchable(t,r){
  const o=OBJ[t];
  return o.cols.map(c=>{
    const v=r[c.k];
    if(Array.isArray(v)) return v.join(' ');
    if(c.k==='accountId'||c.k==='projectId') return nameOf(c.k==='accountId'?'accounts':'projects', v);
    if(c.k==='talentId') return initialsOf(v);
    return v;
  }).join(' ').toLowerCase();
}
function listRows(t){
  const s = ls(t);
  let rows = applyBiz(t, Store.all(t).slice());
  Object.entries(s.filters).forEach(([k,v])=>{ if(v!=null&&v!=='') rows = rows.filter(r=>String(r[k])===String(v)); });
  if(s.q){ const q=s.q.toLowerCase(); rows = rows.filter(r=>searchable(t,r).includes(q)); }
  if(s.sort){
    const c = OBJ[t].cols.find(c=>c.k===s.sort);
    rows.sort((a,b)=>{
      let x=a[s.sort], y=b[s.sort];
      if(s.sort==='_g'){ x=Calc.gross(a); y=Calc.gross(b); }
      if(s.sort==='_gr'){ x=Calc.grossRate(a); y=Calc.grossRate(b); }
      if(typeof x==='number'||typeof y==='number') return ((x||0)-(y||0))*s.dir;
      return String(x==null?'':x).localeCompare(String(y==null?'':y),'ja')*s.dir;
    });
  }
  return rows;
}

function renderList(t, extraFilters){
  const o = OBJ[t], s = ls(t), rows = listRows(t);
  const total = applyBiz(t, Store.all(t)).length;
  const filterChips = (extraFilters||[]).map(f=>{
    const on = s.filters[f.k]===f.v;
    return `<span class="chip ${on?'on':''}" onclick="Behaviors.toggleFilter('${t}','${f.k}','${esc(f.v)}')">${esc(f.l)}${on?' ×':''}</span>`;
  }).join('');
  const head = o.cols.map(c=>{
    const ar = s.sort===c.k ? `<span class="ar">${s.dir>0?'▲':'▼'}</span>` : '';
    return `<th class="sortable ${c.num?'num':''}" ${c.w?`style="width:${c.w}"`:''} onclick="Behaviors.sort('${t}','${c.k}')">${esc(c.l)}${ar}</th>`;
  }).join('') + '<th style="width:34px"></th>';

  const body = rows.length ? rows.map(r=>{
    const tds = o.cols.map(c=>{
      let v = r[c.k];
      let html = c.fmt ? c.fmt(v, r) : esc(v==null?'—':v);
      if(c.link) html = `<a class="name-link" onclick="Router.go('${t}','${r.id}')">${esc(c.k==='id'?r.id:(v||''))}</a>`;
      return `<td class="${c.num?'num':''}">${html}</td>`;
    }).join('');
    return `<tr>${tds}<td class="row-menu"><button class="rm-btn" onclick="Behaviors.rowMenu(event,'${t}','${r.id}')">▾</button></td></tr>`;
  }).join('') : `<tr><td colspan="${o.cols.length+1}"><div class="empty"><span class="ic">🔍</span>該当するレコードがありません<br><span style="font-size:12px">検索条件やフィルタを変更してください</span></div></td></tr>`;

  return `
  <div class="obj-header"><div class="row1">
    <div class="obj-icon ${o.iconCls}">${o.icon}</div>
    <div class="obj-title"><div class="label">${esc(o.label)}</div><div class="name">${esc(o.plural)}</div></div>
    <div class="obj-actions">
      <button class="btn" onclick="Behaviors.exportCsv('${t}')">エクスポート</button>
      <button class="btn primary" onclick="Form.open('${t}')">新規</button>
    </div>
  </div></div>
  <div class="lv-bar">
    <span class="lv-search"><input placeholder="この一覧を検索..." value="${esc(s.q)}" oninput="Behaviors.search('${t}',this.value)"></span>
    ${filterChips}
    ${Object.keys(s.filters).length||s.q||s.sort?`<span class="chip" onclick="Behaviors.clear('${t}')">条件をクリア</span>`:''}
    <span class="lv-count">${rows.length} / ${total} 件${s.sort?' ・ 並び替え: '+esc((o.cols.find(c=>c.k===s.sort)||{}).l||''):''}</span>
  </div>
  <table class="tbl"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
}

/* ---------------------------------------------------------------
   8. 画面
   --------------------------------------------------------------- */
const Pages = {};

Pages.home = () => {
  const k = Calc.kpi();
  const alerts = [];
  Store.all('assignments').filter(a=>a.status==='稼働中'&&a.endDate).forEach(a=>{
    const d = daysBetween(today(), a.endDate);

      label: initialsOf(a.talentId)+' / '+nameOf('projects',a.projectId), body:'契約終了・更新確認', right:'残 '+d+'日'});
  });
  Store.all('projects').filter(p=>p.stage==='提案中').forEach(p=>{
    alerts.push({type:'停滞',cls:'error',t:'projects',id:p.id,label:p.name,body:'提案中のまま動きなし',right:'要確認'});
  });
  const waiting = Store.all('talents').filter(t=>t.status==='待機');
  return `
  <div class="obj-header"><div class="row1">
    <div class="obj-icon home">🏠</div>
    <div class="obj-title"><div class="label">ホーム</div><div class="name">おはようございます、後藤さん</div></div>
    <div class="obj-actions">
      <button class="btn" onclick="Form.open('projects')">＋ 案件を登録</button>
      <button class="btn primary" onclick="Router.go('match')">🎯 マッチング</button>
    </div>
  </div></div>
  <div class="dash-grid">
    <div class="widget span-3"><div class="w-title">稼働中エンジニア</div><div class="w-big">${k.activeCount}<span style="font-size:14px">名</span></div><div class="w-sub up">稼働率 ${pct(k.rate)}（登録${k.talentCount}名中）</div></div>
    <div class="widget span-3"><div class="w-title">待機・終了間近</div><div class="w-big" style="color:var(--warn)">${k.waitingCount + k.endingSoon}<span style="font-size:14px">名</span></div><div class="w-sub">待機${k.waitingCount} / 45日内終了${k.endingSoon}</div></div>
    <div class="widget span-3"><div class="w-title">今月 粗利（稼働中合計）</div><div class="w-big">${yenM(k.gross)}</div><div class="w-sub up">粗利率 ${pct(k.grossRate)}</div></div>
    <div class="widget span-3"><div class="w-title">パイプライン</div><div class="w-big">${yenM(k.pipeline)}</div><div class="w-sub">オープン案件 ${Store.all('projects').filter(p=>STAGE_OPEN.includes(p.stage)).length}件</div></div>

    <div class="widget span-8">
      <div class="w-title">⚠ 要対応（終了間近アサイン・停滞案件）</div>
      <table class="tbl" style="margin-top:6px">
        <thead><tr><th>種別</th><th>対象</th><th>内容</th><th class="num">期日/状況</th></tr></thead>
        <tbody>${alerts.length? alerts.slice(0,6).map(a=>
          `<tr><td><span class="badge ${a.cls}">${a.type}</span></td>
           <td><a class="name-link" onclick="Router.go('${a.t}','${a.id}')">${esc(a.label)}</a></td>
           <td>${esc(a.body)}</td><td class="num">${esc(a.right)}</td></tr>`).join('')
          : '<tr><td colspan="4" style="text-align:center;color:var(--text-mute);padding:20px">要対応の項目はありません</td></tr>'}</tbody>
      </table>
    </div>
    <div class="widget span-4">
      <div class="w-title">待機タレント（早く当てたい）</div>
      <table class="tbl" style="margin-top:6px"><tbody>${
        waiting.length? waiting.map(t=>`<tr><td><span class="dot wait"></span><a class="name-link" onclick="Router.go('talents','${t.id}')">${esc(t.initials)}（${esc((t.skillLang||[])[0]||'')}）</a></td><td class="num">${fmtDate(t.availFrom)}</td></tr>`).join('')
        : '<tr><td style="text-align:center;color:var(--text-mute);padding:16px">待機なし</td></tr>'}</tbody></table>
      <div style="padding:8px 0 0"><button class="btn small" onclick="Router.go('match')">マッチングを開く</button></div>
    </div>
  </div>`;
};

Pages.projects = id => id ? detailProject(id) : renderList('projects',
  STAGES.slice(0,6).map(s=>({k:'stage',v:s,l:s})) ) + kanban();

function kanban(){
  const cols = STAGES.slice(0,6);
  const rows = applyBiz('projects', Store.all('projects'));
  return `<div style="margin-top:14px"><div class="w-title" style="margin-bottom:6px">パイプライン（カンバン・ドラッグで移動できます）</div>
  <div class="kanban">${cols.map(st=>{
    const items = rows.filter(p=>p.stage===st);
    const sum = items.reduce((s,p)=>s+(p.rateMax||0)*(p.headcount||0),0);
    return `<div class="kb-col" data-stage="${esc(st)}">
      <div class="kb-head"><span>${esc(st)}</span><span class="n">${items.length}件 ${sum?yenM(sum):''}</span></div>
      ${items.map(p=>`<div class="kb-card ${p.biz==='PMO'?'pmo':''}" draggable="true" data-id="${p.id}" onclick="Router.go('projects','${p.id}')">
        <div class="t">${esc(p.name)}</div>
        <div class="c">${nameOf('accounts',p.accountId)} ・ ${esc(p.biz)}</div>
        <div class="r"><span>${esc(p.owner||'')}</span><b>${yen(p.rateMax)}×${p.headcount}</b></div>
      </div>`).join('')}
    </div>`;
  }).join('')}</div></div>`;
}

Pages.talents     = id => id ? detailTalent(id) : renderList('talents',
  [{k:'status',v:'待機',l:'待機のみ'},{k:'status',v:'稼働中',l:'稼働中のみ'},{k:'kind',v:'own',l:'自社'},{k:'kind',v:'bp',l:'BP'}]);
Pages.assignments = id => id ? detailAssignment(id) : renderList('assignments',
  ASSIGN_STATUS.map(s=>({k:'status',v:s,l:s})));
Pages.accounts    = id => id ? detailAccount(id) : renderList('accounts',
  [{k:'rt',v:'customer',l:'顧客企業'},{k:'rt',v:'bp',l:'協力会社(BP)'}]);
Pages.contacts    = id => id ? detailContact(id) : renderList('contacts',
  [{k:'kind',v:'customer',l:'顧客担当'},{k:'kind',v:'bp',l:'BP担当'}]);

<script>
/* ---------------------------------------------------------------
   9. 詳細画面
   --------------------------------------------------------------- */
function ed(t,id,k,html){ return `<span class="editable" data-ed="${t}|${id}|${k}">${html}</span>`; }
function fld(l,v){ return `<div class="field"><div class="lbl">${esc(l)}</div><div class="val">${v}</div></div>`; }
function fldFull(l,v){ return `<div class="field full"><div class="lbl">${esc(l)}</div><div class="val">${v}</div></div>`; }
function card(title,body,head2){ return `<div class="card"><div class="card-head">${title}${head2||''}</div><div class="card-body">${body}</div></div>`; }
function related(title,count,body){ return `<div class="related-card"><div class="related-head">${title} <span class="count">(${count})</span></div>${body}</div>`; }
function crumb(t,label,name){ return `<div class="crumb"><a onclick="Router.go('${t}')">${esc(label)}</a><span class="sep">›</span>${esc(name)}</div>`; }
function head(o,rec,label,name,actions){
  return `<div class="obj-header"><div class="row1">
    <div class="obj-icon ${o.iconCls}">${o.icon}</div>
    <div class="obj-title"><div class="label">${esc(label)}</div><div class="name">${esc(name)}</div></div>
    <div class="obj-actions">${actions}</div>
  </div></div>`;
}
function notFound(t){ return `<div class="empty"><span class="ic">🗑</span>レコードが見つかりません（削除された可能性があります）<br><button class="btn" style="margin-top:10px" onclick="Router.go('${t}')">一覧に戻る</button></div>`; }
function stdActions(t,id){
  return `<button class="btn" onclick="Form.open('${t}','${id}')">編集</button>
          <button class="btn" onclick="Behaviors.del('${t}','${id}')">削除</button>`;
}

function detailProject(id){
  const p = Store.get('projects',id); if(!p) return notFound('projects');
  const o = OBJ.projects;
  const as = Store.all('assignments').filter(a=>a.projectId===id);
  const gross = Calc.projectGross(id);
  const path = `<div class="path-label">ステージ ${stageBadge(p.stage)} <span style="margin-left:auto;font-size:11px;color:var(--text-mute)">クリックで変更できます</span></div>
    <div class="path">${STAGES.slice(0,6).map(s=>{
      const i=STAGES.indexOf(s), ci=STAGES.indexOf(p.stage);
      const cls = s===p.stage?'current': (i<ci?'completed':'');
      return `<div class="stage ${cls}" onclick="Behaviors.setStage('${id}','${esc(s)}')">${esc(s)}</div>`;
    }).join('')}</div>`;
  return crumb('projects','案件',p.name) + head(o,p,'案件（'+p.biz+'）',p.name,
      `<button class="btn success" onclick="Docs.makeQuote('${id}')">📄 見積書を作成</button>` + stdActions('projects',id)) + path +
    `<div class="highlights">
      <div class="item"><div class="lbl">顧客</div><div class="val"><a class="name-link" onclick="Router.go('accounts','${p.accountId}')">${nameOf('accounts',p.accountId)}</a></div></div>
      <div class="item"><div class="lbl">単価上限</div><div class="val">${ed('projects',id,'rateMax',yen(p.rateMax))}</div></div>
      <div class="item"><div class="lbl">想定人数</div><div class="val">${ed('projects',id,'headcount',esc(p.headcount)+' 名')}</div></div>
      <div class="item"><div class="lbl">アサイン済</div><div class="val">${as.length} 件</div></div>
      <div class="item"><div class="lbl">粗利（合計/月）</div><div class="val gp ${gross>0?'good':'bad'}">${yen(gross)}</div></div>
    </div>
    <div class="two-col-3"><div>` +
      card('📝 詳細','<div class="field-grid">'+
        fld('事業', ed('projects',id,'biz',esc(p.biz))) +
        fld('担当', ed('projects',id,'owner',esc(p.owner||'—'))) +
        fld('開始予定', ed('projects',id,'startDate',fmtDate(p.startDate))) +
        fld('終了予定', ed('projects',id,'endDate',fmtDate(p.endDate))) +
        fld('勤務地', ed('projects',id,'location',esc(p.location||'—'))) +
        fld('商流段数', ed('projects',id,'tier',esc(p.tier)+' 次')) +
        fldFull('必要スキル', skillTags(p.skills)) +
      '</div>') +
    `</div><div>` +
      related('🔗 アサイン', as.length, `<table class="tbl"><tbody>${
        as.length? as.map(a=>`<tr><td><a class="name-link" onclick="Router.go('assignments','${a.id}')">${initialsOf(a.talentId)}</a></td>
          <td>${assignBadge(a.status)}</td><td class="num gp ${Calc.grossClass(a)}">${yen(Calc.gross(a))}</td></tr>`).join('')
          : '<tr><td style="color:var(--text-mute);padding:14px;text-align:center">まだありません</td></tr>'}</tbody></table>
          <div style="padding:8px 12px"><button class="btn small" onclick="Form.open('assignments',null,{projectId:'${id}'})">＋ アサインを追加</button>

<script>
/* ---------------------------------------------------------------
   10. マッチング（実際にスコア計算）
   --------------------------------------------------------------- */
const MatchState = {projectId:null};
function score(p, t){
  const need = (p.skills||[]).map(s=>s.toLowerCase());
  const have = [].concat(t.skillLang||[],t.skillFw||[],t.skillDb||[],t.skillPhase||[]).map(s=>s.toLowerCase());
  const hit = need.filter(s=>have.some(h=>h.includes(s)||s.includes(h)));
  const skillScore = need.length ? hit.length/need.length*50 : 25;
  const rateScore  = t.rate <= p.rateMax ? 25 : Math.max(0, 25 - (t.rate-p.rateMax)/p.rateMax*100);
  let availScore = 0;
  if(t.status==='待機') availScore = 25;
  else if(t.status==='参画予定') availScore = 12;
  else if(t.availFrom && p.startDate && new Date(t.availFrom) <= new Date(p.startDate)) availScore = 18;
  else availScore = 4;
  return {total: Math.round(skillScore+rateScore+availScore), hit, need, gross:(p.rateMax||0)-(t.rate||0)};
}
Pages.match = () => {
  const projects = applyBiz('projects', Store.all('projects').filter(p=>STAGE_OPEN.includes(p.stage)));
  if(!MatchState.projectId || !Store.get('projects',MatchState.projectId)) MatchState.projectId = (projects[0]||{}).id;
  const p = Store.get('projects', MatchState.projectId);
  if(!p) return `<div class="empty"><span class="ic">🎯</span>オープン中の案件がありません<br><button class="btn" style="margin-top:10px" onclick="Form.open('projects')">案件を登録する</button></div>`;
  const cands = Store.all('talents').map(t=>({t, s:score(p,t)})).sort((a,b)=>b.s.total-a.s.total).slice(0,10);
  return `
  <div class="obj-header"><div class="row1">
    <div class="obj-icon custom">🎯</div>
    <div class="obj-title"><div class="label">マッチング</div><div class="name">案件 → 人材 候補提示</div></div>

  </div></div>
  <div class="lv-bar">
    <label style="font-size:12px;font-weight:600">対象案件</label>
    <select onchange="MatchState.projectId=this.value;Router.render()">

  </div>
  <div class="card"><div class="card-body" style="padding:6px 12px">
    <div class="match-row head"><div>タレント</div><div>スキル適合</div><div>単価 / 想定粗利</div><div>スコア</div></div>
    ${cands.map(({t,s})=>{
      const cls = s.total>=75?'':(s.total>=55?'mid':'low');
      return `<div class="match-row">
        <div><a class="name-link" onclick="Router.go('talents','${t.id}')">${esc(t.initials)}</a>
          <div style="font-size:11px;color:var(--text-mute)">${statusDot(t.status)} ${fmtDate(t.availFrom)}</div></div>
        <div><div class="skills">${s.need.map(n=>`<span class="skill ${s.hit.includes(n)?'hit':'miss'}">${esc(n)}</span>`).join('')}</div>
          <div class="score-bar ${cls}" style="margin-top:5px"><i style="width:${s.total}%"></i></div></div>
        <div>${yen(t.rate)}<div style="font-size:11px" class="gp ${s.gross>200000?'good':s.gross>0?'mid':'bad'}">粗利 ${yen(s.gross)}</div></div>
        <div><span class="score-num">${s.total}</span>
          <button class="btn small" style="margin-left:6px" onclick="Behaviors.assignFromMatch('${p.id}','${t.id}')">アサイン</button></div>
      </div>`;
    }).join('')}
  </div></div>
  <div class="callout"><strong>💡 スコア＝スキル適合(50) ＋ 単価(25) ＋ 稼働可能性(25)。</strong>「アサイン」を押すと実際にアサインレコードが作成され、案件・タレント・ダッシュボードに反映されます。</div>`;

function docType(t){ return t==='quote'?'<span class="badge info">見積書</span>':t==='order'?'<span class="badge gray">注文書</span>':'<span class="badge success">請求書</span>'; }
const Docs = {
  makeQuote(pid){
    const p = Store.get('projects',pid); if(!p) return;
    const as = Store.all('assignments').filter(a=>a.projectId===pid && a.status!=='終了');
    const sub = as.length ? as.reduce((s,a)=>s+a.billRate,0) : (p.rateMax||0)*(p.headcount||1);
    const rec = {id:uid('DOC'), type:'quote', no:'Q-2026-'+String(1000+Store.all('documents').length).slice(1),
      accountId:p.accountId, projectId:pid, amount:Math.round(sub*1.1), sub, issuedAt:'2026-07-23', status:'作成済'};
    Store.insert('documents',rec);
    Toast.show('見積書 '+rec.no+' を作成しました','success');
    Router.go('docs', rec.id);
  },
  makeOrder(aid){
    const a = Store.get('assignments',aid); if(!a) return;
    const t = Store.get('talents',a.talentId);
    const rec = {id:uid('DOC'), type:'order', no:'O-2026-'+String(1000+Store.all('documents').length).slice(1),
      accountId: t?t.bpAccountId:null, projectId:a.projectId, assignmentId:aid,
      amount:Math.round(a.costRate*1.1), sub:a.costRate, issuedAt:'2026-07-23', status:'作成済'};
    if(!rec.accountId){ Toast.show('BP人材ではないため注文書は作成できません','warn'); return; }
    Store.insert('documents',rec);
    Toast.show('注文書 '+rec.no+' を作成しました','success');
    Router.go('docs', rec.id);
  },
  batchTargets(){
    return Store.all('assignments').filter(a=>a.status==='稼働中').map(a=>{
      const p = Store.get('projects',a.projectId);
      const hours = 140 + ((parseInt(a.id.replace(/\D/g,''))*13)%50);
      let adj = 0;
      if(hours > a.settleMax) adj = Math.round(a.billRate/a.settleMax*(hours-a.settleMax));
      if(hours < a.settleMin) adj = -Math.round(a.billRate/a.settleMin*(a.settleMin-hours));
      const submitted = (parseInt(a.id.replace(/\D/g,''))%7)!==0;
      return {a,p,hours:submitted?hours:null,adj:submitted?adj:0,submitted,
              amount: submitted ? a.billRate+adj : 0,
              accountId: p?p.accountId:null};
    });
  },
  runBatch(){
    const rows = this.batchTargets().filter(r=>r.submitted && Batch.checked[r.a.id]!==false);
    if(!rows.length){ Toast.show('対象がありません','warn'); return; }
    const byAcc = {};
    rows.forEach(r=>{ byAcc[r.accountId] = (byAcc[r.accountId]||0) + r.amount; });
    const total = rows.reduce((s,r)=>s+r.amount,0);
    Object.entries(byAcc).forEach(([acc,amt])=>{
      Store.insert('documents',{id:uid('DOC'),type:'invoice',
        no:'I-2026-07-'+String(100+Object.keys(byAcc).indexOf(acc)+1).slice(1),
        accountId:acc, month:'2026-07', amount:Math.round(amt*1.1), sub:amt,
        issuedAt:'2026-07-23', status:'発行済'});
    });
    Toast.show(`請求書 ${Object.keys(byAcc).length}件（${rows.length}アサイン・${yen(Math.round(total*1.1))}）を発行しました`,'success');
    Router.go('docs');
  }
};

<script>
/* ---------------------------------------------------------------
   14. フォーム（新規・編集）
   --------------------------------------------------------------- */
const Modal = {
  open(html, wide){ $('#modalEl').className='modal'+(wide?' wide':''); $('#modalEl').innerHTML=html; $('#modalBg').classList.add('active'); },
  close(){ $('#modalBg').classList.remove('active'); }
};
$('#modalBg').addEventListener('click', e=>{ if(e.target.id==='modalBg') Modal.close(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') Modal.close(); });

const Form = {
  ctx:null,
  open(t, id, preset){
    const o = OBJ[t]; if(!o) return;
    const rec = id ? Store.get(t,id) : Object.assign({}, preset||{});
    if(id && !rec){ Toast.show('レコードが見つかりません','error'); return; }
    this.ctx = {t, id, rec};
    const body = `<div class="form-grid">${o.form.map(f=>this.field(f, rec)).join('')}
      ${o.form.some(f=>f.calc) ? `<div class="calc-box" id="calcBox"></div>` : ''}</div>`;
    Modal.open(`
      <div class="modal-head">${o.icon} ${id?'編集':'新規'}：${esc(o.label)}<span class="x" onclick="Modal.close()">×</span></div>
      <div class="modal-body">${body}</div>
      <div class="modal-foot">
        <button class="btn" onclick="Modal.close()">キャンセル</button>
        ${id?`<button class="btn" onclick="Behaviors.del('${t}','${id}')">削除</button>`:''}
        <button class="btn primary" onclick="Form.save()">保存</button>
      </div>`, o.form.length>10);
    this.recalc();
    const first = $('#modalEl input,#modalEl select'); if(first) first.focus();
  },
  field(f, rec){
    const v = rec[f.k];
    const id = 'f_'+f.k;
    let ctl='';
    if(f.t==='select'){
      const os = f.o();
      ctl = `<select id="${id}" onchange="Form.recalc()">${os.map(o=>`<option value="${esc(o.v)}" ${String(o.v)===String(v==null?'':v)?'selected':''}>${esc(o.l)}</option>`).join('')}</select>`;
    } else if(f.t==='multi'){
      const cur = v||[];
      ctl = `<div class="msel" id="${id}">${f.src().map(s=>
        `<label><input type="checkbox" value="${esc(s)}" ${cur.includes(s)?'checked':''}>${esc(s)}</label>`).join('')}</div>`;
    } else if(f.t==='textarea'){
      ctl = `<textarea id="${id}">${esc(v||'')}</textarea>`;
    } else {
      ctl = `<input id="${id}" type="${f.t}" value="${esc(v==null?'':v)}" ${f.calc?'oninput="Form.recalc()"':''}>`;
    }
    return `<div class="fitem ${f.full?'full':''}" data-k="${f.k}">
      <label for="${id}">${esc(f.l)}${f.req?'<span class="req">*</span>':''}</label>
      ${ctl}${f.hint?`<div class="hint">${esc(f.hint)}</div>`:''}<div class="err">必須項目です</div></div>`;
  },
  read(){
    const o = OBJ[this.ctx.t]; const out={};
    o.form.forEach(f=>{
      const el = $('#f_'+f.k);
      if(!el) return;
      if(f.t==='multi') out[f.k] = $$('input:checked', el).map(i=>i.value);
      else if(f.t==='number') out[f.k] = el.value===''?null:Number(el.value);
      else out[f.k] = el.value;
    });
    return out;
  },
  recalc(){
    const box = $('#calcBox'); if(!box) return;
    const b = Number(($('#f_billRate')||{}).value||0), c = Number(($('#f_costRate')||{}).value||0);
    const g = b-c, r = b? g/b*100 : 0;
    const cls = r>=28?'good':r>=18?'mid':'bad';
    box.innerHTML = `<div>粗利（自動計算）<br><b class="gp ${cls}">${yen(g)}</b></div>
      <div>粗利率（自動計算）<br><b class="gp ${cls}">${pct(r)}</b></div>
      <div style="color:var(--text-mute);align-self:center">※Salesforceでは数式項目として自動計算されます</div>`;
  },
  save(){
    const {t,id} = this.ctx, o = OBJ[t];
    const vals = this.read();
    let ok = true;
    o.form.forEach(f=>{
      const item = $(`#modalEl .fitem[data-k="${f.k}"]`); if(!item) return;
      const empty = vals[f.k]===''||vals[f.k]==null||(Array.isArray(vals[f.k])&&!vals[f.k].length);
      const bad = f.req && empty;
      item.classList.toggle('invalid', bad);
      if(bad) ok=false;
    });
    if(!ok){ Toast.show('必須項目が未入力です','error'); return; }
    if(id){
      Store.update(t,id,vals);
      Toast.show(`${o.label}を保存しました`,'success');
    } else {
      const pre = {projects:'PRJ',talents:'TAL',assignments:'ASG',accounts:'ACC',contacts:'CON'}[t];
      const rec = Object.assign({id:uid(pre)}, this.ctx.rec, vals);
      Store.insert(t,rec);
      Toast.show(`${o.label}を作成しました（${rec.id}）`,'success');
      Modal.close(); Router.go(t, rec.id); return;
    }
    Modal.close(); Router.render();
  }
};

/* ---------------------------------------------------------------
   15. 操作（ソート・検索・インライン編集・DnD ほか）
   --------------------------------------------------------------- */
const Behaviors = {
  sort(t,k){ const s=ls(t); if(s.sort===k) s.dir*=-1; else {s.sort=k;s.dir=1;} Router.render(); },
  search(t,v){ const s=ls(t); s.q=v; const el=document.activeElement; Router.render();
    const inp=$('.lv-search input'); if(inp){ inp.focus(); inp.setSelectionRange(v.length,v.length);} },
  toggleFilter(t,k,v){ const s=ls(t); s.filters[k] = (s.filters[k]===v)? undefined : v;
    if(s.filters[k]===undefined) delete s.filters[k]; Router.render(); },
  clear(t){ ListState[t]={q:'',sort:null,dir:1,filters:{}}; Router.render(); },
  rowMenu(e,t,id){
    e.stopPropagation();
    $$('.rm-pop').forEach(p=>p.remove());
    const pop = document.createElement('div'); pop.className='rm-pop';
    const isDoc = t==='documents';
    pop.innerHTML = `<div onclick="Router.go('${isDoc?'docs':t}','${id}')">開く</div>
      ${isDoc?'':`<div onclick="Form.open('${t}','${id}')">編集</div>`}
      ${isDoc?'':`<div onclick="Behaviors.dup('${t}','${id}')">複製</div>`}
      <div class="danger" onclick="Behaviors.del('${t}','${id}')">削除</div>`;
    e.target.parentNode.appendChild(pop);
    setTimeout(()=>document.addEventListener('click', function h(){ pop.remove(); document.removeEventListener('click',h); }),0);
  },
  dup(t,id){
    const r = Store.get(t,id); if(!r) return;
    const pre = {projects:'PRJ',talents:'TAL',assignments:'ASG',accounts:'ACC',contacts:'CON'}[t];
    const copy = Object.assign({},r,{id:uid(pre)});
    if(copy.name) copy.name += '（コピー）';
    Store.insert(t,copy); Toast.show('複製しました（'+copy.id+'）','success'); Router.render();
  },
  del(t,id){
    const o = OBJ[t] || {label:'帳票'};
    const label = t==='documents' ? (Store.get(t,id)||{}).no : (o.title? o.title(Store.get(t,id)||{}) : id);
    Modal.open(`<div class="modal-head">⚠️ 削除の確認<span class="x" onclick="Modal.close()">×</span></div>
      <div class="modal-body"><p><b>${esc(label)}</b> を削除します。よろしいですか？</p>
      <p style="font-size:12px;color:var(--text-mute)">関連レコードは削除されません（デモのため）。「データを初期化」でいつでも元に戻せます。</p></div>
      <div class="modal-foot"><button class="btn" onclick="Modal.close()">キャンセル</button>
      <button class="btn" style="background:var(--error);color:#fff;border-color:var(--error)" onclick="Behaviors.delConfirm('${t}','${id}')">削除する</button></div>`);
  },
  delConfirm(t,id){
    Store.remove(t,id); Modal.close();
    Toast.show('削除しました','success');
    const back = t==='documents'?'docs':t;
    if(Router.recId===id) Router.go(back); else Router.render();
  },
  setStage(id,stage){
    Store.update('projects',id,{stage});
    Toast.show('ステージを「'+stage+'」に変更しました','success');
    Router.render();
  },
  setAssignStatus(id,status){
    Store.update('assignments',id,{status});
    const a = Store.get('assignments',id);
    if(status==='稼働中' && a){ Store.update('talents',a.talentId,{status:'稼働中'}); }
    Toast.show('ステータスを「'+status+'」に変更しました。タレントの並行状況も再計算されました','success');
    Router.render();
  },
  assignFromMatch(pid,tid){
    const p = Store.get('projects',pid), t = Store.get('talents',tid);
    const rec = {id:uid('ASG'), projectId:pid, talentId:tid, status:'提案中',
      billRate:p.rateMax, costRate:t.rate, startDate:p.startDate, endDate:p.endDate, settleMin:140, settleMax:180};
    Store.insert('assignments',rec);
    Toast.show(`アサイン ${rec.id} を作成しました（粗利 ${yen(Calc.gross(rec))}）`,'success');
    Router.go('assignments', rec.id);
  },
  sendDoc(id){
    Store.update('documents',id,{status:'送付済'});
    Toast.show('メールを送付しました（デモ）。状態を「送付済」に更新しました','success');
    Router.render();
  },
  exportCsv(t){
    const o=OBJ[t], rows=listRows(t);
    const head=o.cols.map(c=>c.l).join(',');
    const body=rows.map(r=>o.cols.map(c=>{
      let v=r[c.k];
      if(c.k==='accountId') v=nameOf('accounts',v).replace(/<[^>]+>/g,'');
      if(c.k==='projectId') v=nameOf('projects',v).replace(/<[^>]+>/g,'');
      if(c.k==='talentId') v=initialsOf(v);
      if(c.k==='_g') v=Calc.gross(r); if(c.k==='_gr') v=Calc.grossRate(r).toFixed(1);
      if(Array.isArray(v)) v=v.join(' / ');
      return '"'+String(v==null?'':v).replace(/"/g,'""')+'"';
    }).join(',')).join('\n');
    const blob = new Blob(['﻿'+head+'\n'+body],{type:'text/csv;charset=utf-8'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download=o.label+'.csv'; a.click(); URL.revokeObjectURL(a.href);
    Toast.show(`${rows.length}件をCSVに出力しました`,'success');
  },
  /* インライン編集 */
  inline(el){
    if(el._editing) return; el._editing=true;
    const [t,id,k] = el.dataset.ed.split('|');
    const rec = Store.get(t,id); if(!rec){ el._editing=false; return; }
    const o = OBJ[t] || {form:[]};
    const f = (o.form||[]).find(x=>x.k===k) || {t:'text'};
    const old = el.innerHTML;
    let ctl;
    if(f.t==='select'){
      ctl = document.createElement('select');
      f.o().forEach(op=>{ const e=document.createElement('option'); e.value=op.v; e.textContent=op.l;
        if(String(op.v)===String(rec[k])) e.selected=true; ctl.appendChild(e); });
    } else {
      ctl = document.createElement('input');
      ctl.type = f.t==='number'?'number' : f.t==='date'?'date' : 'text';
      ctl.value = rec[k]==null?'':rec[k];
    }
    const wrap = document.createElement('span'); wrap.className='inline-edit';
    wrap.appendChild(ctl);
    const ok = document.createElement('button'); ok.className='btn small primary'; ok.textContent='✓';
    const ng = document.createElement('button'); ng.className='btn small'; ng.textContent='×';
    wrap.appendChild(ok); wrap.appendChild(ng);
    el.innerHTML=''; el.appendChild(wrap); ctl.focus();
    const cancel = ()=>{ el.innerHTML=old; el._editing=false; };
    const commit = ()=>{
      let v = ctl.value; if(f.t==='number') v = v===''?null:Number(v);
      Store.update(t,id,{[k]:v});
      Toast.show('保存しました','success');
      el._editing=false; Router.render();
    };
    ok.onclick = e=>{e.stopPropagation();commit();};
    ng.onclick = e=>{e.stopPropagation();cancel();};
    ctl.onkeydown = e=>{ if(e.key==='Enter'){e.preventDefault();commit();} if(e.key==='Escape'){cancel();} };
    ctl.onclick = e=>e.stopPropagation();
  },
  bind(){
    $$('.editable').forEach(el=>{ el.onclick = e=>{ e.stopPropagation(); Behaviors.inline(el); }; });
    // カンバン ドラッグ&ドロップ
    $$('.kb-card').forEach(c=>{
      c.ondragstart = e=>{ e.dataTransfer.setData('text/plain', c.dataset.id); c.classList.add('dragging'); };
      c.ondragend  = ()=> c.classList.remove('dragging');
    });
    $$('.kb-col').forEach(col=>{
      col.ondragover = e=>{ e.preventDefault(); col.classList.add('dragover'); };
      col.ondragleave = ()=> col.classList.remove('dragover');
      col.ondrop = e=>{
        e.preventDefault(); col.classList.remove('dragover');
        const id = e.dataTransfer.getData('text/plain');

/* グローバル検索 */
(function(){
  const inp = $('#gsearch'), pop = $('#gsPop');
  const SRC = [
    {t:'projects', l:'案件',   f:r=>r.name},
    {t:'talents',  l:'タレント', f:r=>r.initials+' '+[].concat(r.skillLang||[]).join(' ')},
    {t:'accounts', l:'取引先',  f:r=>r.name},
    {t:'contacts', l:'人情報',  f:r=>r.name}
  ];
  inp.addEventListener('input',()=>{
    const q = inp.value.trim().toLowerCase();
    if(!q){ pop.classList.remove('show'); return; }
    let html='';
    SRC.forEach(s=>{
      const hits = Store.all(s.t).filter(r=>String(s.f(r)).toLowerCase().includes(q)).slice(0,5);
      if(!hits.length) return;
      html += `<div class="gs-grp">${s.l}</div>` + hits.map(r=>
        `<div class="gs-item" onclick="Router.go('${s.t}','${r.id}');document.getElementById('gsPop').classList.remove('show');document.getElementById('gsearch').value=''">
          <span>${esc(r.name||r.initials)}</span><span class="sub">${esc(r.id)}</span></div>`).join('');
    });
    pop.innerHTML = html || '<div class="gs-item" style="color:var(--text-mute)">該当なし</div>';
    pop.classList.add('show');
  });
  document.addEventListener('click', e=>{ if(!e.target.closest('.gh-search')) pop.classList.remove('show'); });
})();
